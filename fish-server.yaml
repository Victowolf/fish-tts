apiVersion: apps/v1
kind: Deployment
metadata:
  name: fish-tts-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fish-tts
  template:
    metadata:
      labels:
        app: fish-tts
    spec:
      restartPolicy: Always
      containers:
        - name: fish-tts-container
          image: nvcr.io/nvidia/pytorch:24.03-py3
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -euo pipefail
              echo "=== Starting Fish TTS Server ==="

              cd /workspace || mkdir -p /workspace && cd /workspace

              rm -rf repo || true
              git clone https://github.com/YOUR_USERNAME/YOUR_REPO.git repo

              cd repo

              chmod +x start.sh
              ./start.sh

          resources:
            limits:
              nvidia.com/mig-2g.35gb: 1

          ports:
            - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: fish-tts-service
spec:
  selector:
    app: fish-tts
  ports:
    - port: 80
      targetPort: 8000
  type: NodePort